version: "3.8"

# ==============================================================================
# Dokploy Local Test Environment
# ==============================================================================
# Deploy with: docker stack deploy -c docker-compose.yml dokploy
# Do NOT use "docker compose up" - Dokploy requires Swarm mode.
# ==============================================================================

services:
  dokploy-postgres:
    image: postgres:16
    networks:
      - dokploy-network
    environment:
      POSTGRES_USER: dokploy
      POSTGRES_DB: dokploy
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    secrets:
      - postgres_password
    volumes:
      - postgres-data:/var/lib/postgresql/data
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager

  dokploy-redis:
    image: redis:7
    networks:
      - dokploy-network
    volumes:
      - redis-data:/data
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager

  dokploy:
    image: dokploy/dokploy:${DOKPLOY_VERSION:-latest}
    networks:
      - dokploy-network
    ports:
      - target: 3000
        published: ${PORT_DASHBOARD:-3000}
        mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - dokploy-config:/etc/dokploy
      - dokploy-docker:/root/.docker
    secrets:
      - postgres_password
    environment:
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      ADVERTISE_ADDR: ${ADVERTISE_ADDR:-127.0.0.1}
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        order: stop-first
      placement:
        constraints:
          - node.role == manager
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:3000/api/trpc/settings.health"]
      interval: 10s
      timeout: 3s
      retries: 10

  dokploy-traefik:
    image: traefik:v3.6.7
    networks:
      - dokploy-network
    ports:
      - target: 80
        published: ${PORT_HTTP:-80}
        mode: host
      - target: 443
        published: ${PORT_HTTPS:-443}
        mode: host
    volumes:
      - dokploy-config:/etc/dokploy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 10
    # Traefik reads config from /etc/dokploy/traefik/traefik.yml
    # which Dokploy generates on first boot.
    # If Traefik starts before Dokploy writes the config, it will restart
    # automatically until the config is available.
    command:
      - "--configFile=/etc/dokploy/traefik/traefik.yml"

networks:
  dokploy-network:
    driver: overlay
    attachable: true

volumes:
  postgres-data:
  redis-data:
  dokploy-config:
  dokploy-docker:

secrets:
  postgres_password:
    external: true
    name: dokploy_postgres_password
